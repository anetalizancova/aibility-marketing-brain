name: Generate Webinar Follow-up

on:
  workflow_dispatch:
    inputs:
      transcript_file:
        description: 'Filename of transcript (leave empty to auto-detect all new ones)'
        required: false
        type: string
      force:
        description: 'Force reprocess even if already processed'
        required: false
        type: boolean
        default: false

jobs:
  generate-follow-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout marketing-brain repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate follow-up emails
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CONTENT_REPO: aibilitycz/content
          TRANSCRIPT_DIR: prepisy-webinaru-edu
          MANUAL_FILE: ${{ github.event.inputs.transcript_file || '' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: node .github/scripts/generate-follow-up.mjs
